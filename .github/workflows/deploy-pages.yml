name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          set -euo pipefail
          mkdir -p _site/assets/images _site/data

          cp index.html README.md _site/
          cp -R assets/css _site/assets/
          cp -R assets/js _site/assets/
          cp -R assets/images/artworks-web _site/assets/images/
          cp -R assets/images/portraits _site/assets/images/
          cp -R assets/images/publications _site/assets/images/
          cp data/artworks.js data/exhibitions.js data/publications.js _site/data/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
